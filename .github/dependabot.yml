version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - "Dependencies"
    cooldown:
      default-days: 1
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: monthly
    labels:
      - "Dependencies"
    cooldown:
      default-days: 1
    groups:
      python:
        patterns:
          - "*"
