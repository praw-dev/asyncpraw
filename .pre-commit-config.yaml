repos:
  - hooks:
      - id: docstrfmt
        require_serial: true
    repo: https://github.com/LilSpazJoekp/docstrfmt
    rev: a05381030e526dc863e2006d34824271d7681d08  # frozen: v2.2.0

  - hooks:
      - id: codesorter
        require_serial: true
    repo: https://github.com/praw-dev/CodeSorter
    rev: 03a8cecfa6ae82183f9e152d1bbb16ea6a6c1d11  # frozen: v0.2.8

  - hooks:
      - id: auto-walrus
    repo: https://github.com/MarcoGorelli/auto-walrus
    rev: 1743edbed52f3d61886b59d98a27164a8af29c0d  # frozen: 0.4.1

  - hooks:
      - args: [ --exit-non-zero-on-fix, --fix ]
        id: ruff
      - id: ruff-format
    repo: https://github.com/astral-sh/ruff-pre-commit
    rev: c59bba8fb259db0fec2bbb77ad8ba51ea7341b56  # frozen: v0.15.20

  - hooks:
      - files: ^(.*\.toml)$
        id: toml-sort-fix
    repo: https://github.com/pappasam/toml-sort
    rev: 2970ae9bb7124fe5117a27e10c10d2da051ce05a  # frozen: v0.24.4

  - hooks:
      - id: check-added-large-files
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - args: [ --fix=lf ]
        id: mixed-line-ending
      - args: [ --pytest-test-first ]
        files: ^tests/(integration|unit)/.*\.py$
        id: name-tests-test
      - id: no-commit-to-branch
      - files: ^(\.github/workflows/.*\.ya?ml|\.readthedocs.ya?ml)$
        id: sort-simple-yaml
      - id: trailing-whitespace
    repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0

  - hooks:
      - args:
          - '--replace'
        entry: python -m tools.static_word_checks
        id: static_word_checks
        language: system
        name: Static Word Checks
        pass_filenames: false
        types: [ python ]

      - entry: python -m tools.check_documentation
        id: check_documentation
        language: system
        name: Check Documentation
        pass_filenames: false
        types: [ python ]
    repo: local
